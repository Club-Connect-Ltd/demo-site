name: Deploy to Cloudflare Pages

on:
  workflow_run:
    workflows:
      - "Build Astro site" # Must exactly match the build workflow name
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      deployments: write

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: astro-site
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: astro-site

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: "club-connect-demo" # Update to match your Cloudflare Pages project name
          directory: "astro-site"
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      # ── Cache purge (remove if not using a custom domain) ──
      - name: Purge Cloudflare cache
        if: ${{ vars.CF_CUSTOM_DOMAIN != '' }}
        run: |
          curl -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CF_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything": true}'

  # ── Slack notification (remove entire job if not needed) ──
  notify:
    needs: deploy
    if: ${{ needs.deploy.result == 'success' }}
    uses: ./.github/workflows/slack-notify.yml
    with:
      title: "SITE DEPLOYED"
      message: "Club Connect Demo Site was built and deployed successfully to Cloudflare Pages."
      channel: "#deployments"
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
